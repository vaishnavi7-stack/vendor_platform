<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Industrial Execution Control</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <aside class="rail">
      <div class="brand">
        <div class="mark">IE</div>
        <div>
          <strong>Execution Control</strong>
          <span>PO to bank transfer</span>
        </div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="rail-foot">
        <div><b>Guardrails active</b></div>
        <div>Passed quantity, signature order, invoice lock, compliance gate, and retention ledger.</div>
      </div>
    </aside>
    <main>
      <div class="topbar">
        <div>
          <h1 id="pageTitle"></h1>
          <div class="subtle" id="pageSubtitle"></div>
        </div>
        <div class="actions" style="margin-top:0">
          <button class="secondary" id="seedBtn">Reset Demo Data</button>
          <button class="secondary" id="exportBtn">Export JSON</button>
        </div>
      </div>
      <section id="app"></section>
    </main>
  </div>
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
